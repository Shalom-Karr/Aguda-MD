<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <title>FAQ · Baltimore Community Resource Network</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { sans: ['Inter', 'sans-serif'] },
      colors: { brand: { 50:'#eff3f8',100:'#dbeafe',500:'#2e5a8f',600:'#25496f',700:'#1e3a5f',800:'#162d4a',900:'#0f2540' } }
    }}}
  </script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
  <script>
    /* External links (http/https) open in a new tab. Internal/relative
     * links stay in the same tab. */
    DOMPurify.addHook('afterSanitizeAttributes', function (node) {
      if (node.tagName === 'A' && node.hasAttribute('href')) {
        const href = node.getAttribute('href');
        if (/^https?:\/\//i.test(href)) {
          node.setAttribute('target', '_blank');
          node.setAttribute('rel', 'noopener noreferrer');
        }
      }
    });
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    details[open] summary .arrow { transform: rotate(180deg); }
    summary::-webkit-details-marker { display: none; }
    summary { list-style: none; }
  </style>
</head>
<body class="bg-stone-50 text-slate-900 antialiased">

  <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
    <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <img src="assets/logo.png" alt="BCRN — Baltimore Community Resource Network" class="h-12 w-auto">
      </a>
      <nav class="hidden md:flex items-center gap-7 text-sm font-semibold text-slate-600">
        <a href="index.html" class="hover:text-brand-700">Programs</a>
        <a id="nav-faq" href="faq.html" class="hidden text-brand-700">FAQ</a>
        <a href="book.html"  class="hover:text-brand-700">Book a Call</a>
      </nav>
    </div>
  </header>

  <!-- "Page not found" view, shown when the general FAQ section is disabled -->
  <main id="notfound" class="hidden max-w-3xl mx-auto px-6 py-20 text-center">
    <p class="text-7xl font-extrabold text-slate-200 mb-4">404</p>
    <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Page not found</h1>
    <p class="text-slate-500 mb-8">The page you're looking for doesn't exist.</p>
    <a href="index.html" class="inline-block bg-brand-700 hover:bg-brand-800 text-white font-bold px-6 py-3 rounded-xl">Back to programs</a>
  </main>

  <main id="faq-main" class="hidden max-w-3xl mx-auto px-6 py-12 md:py-16">
    <h1 id="faq-page-heading" class="text-4xl md:text-5xl font-extrabold tracking-tight text-slate-900 mb-3"></h1>
    <p id="faq-page-subhead" class="text-lg text-slate-600 mb-12"></p>

    <div id="faq-loading" class="py-12 text-center text-slate-400 text-sm">Loading...</div>
    <div class="space-y-3" id="faq-list"></div>
    <div id="faq-empty" class="hidden py-12 text-center text-slate-400 text-sm">No FAQs published yet. Check back soon.</div>

    <div class="mt-16 p-8 bg-gradient-to-br from-brand-700 to-brand-800 text-white rounded-2xl text-center">
      <h2 id="faq-cta-heading" class="text-2xl font-bold mb-2"></h2>
      <p id="faq-cta-subhead" class="text-blue-50/90 mb-5"></p>
      <a id="cta-book" href="#" class="inline-block bg-white hover:bg-blue-50 text-brand-800 font-bold px-6 py-3 rounded-xl transition-colors"></a>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="assets/config.js"></script>
  <script src="assets/supabase-client.js"></script>
  <script src="assets/apply-config.js"></script>
  <script src="assets/footer.js"></script>
  <script>
    function applyConfig() {
      const C = window.SITE_CONFIG;
      const fp = C.faqPage || {};

      const faqLink = document.getElementById('nav-faq');
      if (faqLink) faqLink.classList.toggle('hidden', C.faqEnabled === false);

      document.getElementById('faq-page-heading').textContent = fp.heading || 'Frequently asked questions';
      document.getElementById('faq-page-subhead').textContent = fp.subhead || "Can't find your question? Book a call below.";
      document.getElementById('faq-cta-heading').textContent  = fp.ctaHeading || 'Still stuck?';
      document.getElementById('faq-cta-subhead').textContent  = fp.ctaSubhead || "Talk to a real person — it's free.";

      const cta = document.getElementById('cta-book');
      cta.textContent = fp.ctaButton || 'Book a free call';
      const isInline = C.bookingMode === 'inline';
      cta.href = isInline ? 'book.html' : C.calendlyUrl;
      if (isInline) { cta.removeAttribute('target'); cta.removeAttribute('rel'); }
      else          { cta.target = '_blank'; cta.rel = 'noopener'; }
      window.mountFooter();
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    async function loadFaqs() {
      let list;
      try { list = await window.ProgramsDB.listFaqPageFaqs(); }
      catch (e) { console.error(e); list = []; }
      document.getElementById('faq-loading').classList.add('hidden');
      const listEl = document.getElementById('faq-list');
      const emptyEl = document.getElementById('faq-empty');
      if (!list.length) { emptyEl.classList.remove('hidden'); return; }
      listEl.innerHTML = list.map(f => `
        <details class="group bg-white border border-slate-200 rounded-xl overflow-hidden hover:border-brand-500 transition-colors">
          <summary class="flex items-center justify-between px-6 py-5 cursor-pointer font-bold text-lg text-slate-900">
            <span>${escapeHtml(f.question)}</span>
            <svg class="arrow w-5 h-5 text-brand-700 transition-transform flex-shrink-0 ml-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
          </summary>
          <div class="px-6 pb-6 text-slate-600 leading-relaxed border-t border-slate-100 pt-4">${DOMPurify.sanitize(f.answer || '')}</div>
        </details>`).join('');
    }

    /* Init — wait for DB-merged config to know whether the FAQ page should
     * even render. If faqEnabled === false, show the 404 view instead. */
    window.applyDynamicConfig().then(() => {
      const C = window.SITE_CONFIG;
      if (C.faqEnabled === false) {
        document.title = 'Page not found · ' + (C.name || 'BCRN');
        document.getElementById('notfound').classList.remove('hidden');
        window.mountFooter();
        return;
      }
      document.getElementById('faq-main').classList.remove('hidden');
      applyConfig();
      loadFaqs();
    });
  </script>
</body>
</html>
