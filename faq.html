<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <title>FAQ · Baltimore Community Resource Network</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { sans: ['Inter', 'sans-serif'] },
      colors: { brand: { 50:'#eff6ff',100:'#dbeafe',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' } }
    }}}
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    details[open] summary .arrow { transform: rotate(180deg); }
    summary::-webkit-details-marker { display: none; }
    summary { list-style: none; }
  </style>
</head>
<body class="bg-stone-50 text-slate-900 antialiased">

  <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
    <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <img src="assets/logo.png" alt="BCRN — Baltimore Community Resource Network" class="h-12 w-auto">
      </a>
      <nav class="hidden md:flex items-center gap-7 text-sm font-semibold text-slate-600">
        <a href="index.html" class="hover:text-brand-700">Programs</a>
        <a href="faq.html"   class="text-brand-700">FAQ</a>
        <a href="book.html"  class="hover:text-brand-700">Book a Call</a>
      </nav>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-6 py-12 md:py-16">
    <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-slate-900 mb-3">Frequently asked questions</h1>
    <p class="text-lg text-slate-600 mb-12">Can't find your question? <a href="book.html" class="text-brand-700 font-semibold underline decoration-2 underline-offset-2 hover:text-brand-900">Book a call</a>.</p>

    <div id="faq-loading" class="py-12 text-center text-slate-400 text-sm">Loading...</div>
    <div class="space-y-3" id="faq-list"></div>
    <div id="faq-empty" class="hidden py-12 text-center text-slate-400 text-sm">No FAQs published yet. Check back soon.</div>

    <div class="mt-16 p-8 bg-gradient-to-br from-brand-700 to-brand-800 text-white rounded-2xl text-center">
      <h2 class="text-2xl font-bold mb-2">Still stuck?</h2>
      <p class="text-blue-50/90 mb-5">Talk to a real person — it's free.</p>
      <a id="cta-book" href="#" class="inline-block bg-white hover:bg-blue-50 text-brand-800 font-bold px-6 py-3 rounded-xl transition-colors">Book a free call</a>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="assets/config.js"></script>
  <script src="assets/supabase-client.js"></script>
  <script src="assets/apply-config.js"></script>
  <script src="assets/footer.js"></script>
  <script>
    function applyConfig() {
      const C = window.SITE_CONFIG;
      const cta = document.getElementById('cta-book');
      const isInline = C.bookingMode === 'inline';
      cta.href = isInline ? 'book.html' : C.calendlyUrl;
      if (isInline) { cta.removeAttribute('target'); cta.removeAttribute('rel'); }
      else          { cta.target = '_blank'; cta.rel = 'noopener'; }
      window.mountFooter();
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    async function loadFaqs() {
      let list;
      try { list = await window.ProgramsDB.listFaqPageFaqs(); }
      catch (e) { console.error(e); list = []; }
      document.getElementById('faq-loading').classList.add('hidden');
      const listEl = document.getElementById('faq-list');
      const emptyEl = document.getElementById('faq-empty');
      if (!list.length) { emptyEl.classList.remove('hidden'); return; }
      listEl.innerHTML = list.map(f => `
        <details class="group bg-white border border-slate-200 rounded-xl overflow-hidden hover:border-brand-500 transition-colors">
          <summary class="flex items-center justify-between px-6 py-5 cursor-pointer font-bold text-lg text-slate-900">
            <span>${escapeHtml(f.question)}</span>
            <svg class="arrow w-5 h-5 text-brand-700 transition-transform flex-shrink-0 ml-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
          </summary>
          <div class="px-6 pb-6 text-slate-600 leading-relaxed border-t border-slate-100 pt-4">${f.answer || ''}</div>
        </details>`).join('');
    }

    /* Init */
    applyConfig();
    window.applyDynamicConfig().then(applyConfig);
    loadFaqs();
  </script>
</body>
</html>
