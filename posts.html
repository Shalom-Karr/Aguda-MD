<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <title>Program Guide · Agudath Israel of Maryland</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'] },
        colors: { brand: { 50:'#f0fdfa',100:'#ccfbf1',500:'#14b8a6',600:'#0d9488',700:'#0f766e',800:'#115e59',900:'#134e4a' } }
      }}
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    .prose h2 { scroll-margin-top: 5rem; }
    .prose a { color: #0f766e; }
    .prose a:hover { color: #115e59; }
    .prose blockquote { border-left-color: #14b8a6; background: #f0fdfa; padding: 0.5rem 1rem; border-radius: 0 0.5rem 0.5rem 0; }
    .prose ol li::marker { color: #0d9488; font-weight: 700; }
    .prose img { border-radius: .75rem; box-shadow: 0 6px 24px -8px rgba(0,0,0,.15); margin: 1.5rem 0; }
    #progress { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg,#14b8a6,#0d9488); width: 0%; z-index: 60; transition: width .1s; }
  </style>
</head>
<body class="bg-stone-50 text-slate-900 antialiased">
  <div id="progress"></div>

  <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
    <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <img src="assets/logo.png" alt="Agudath Israel of Maryland" class="h-11 w-auto">
      </a>
      <nav class="hidden md:flex items-center gap-7 text-sm font-semibold text-slate-600">
        <a href="index.html" class="hover:text-brand-700">Programs</a>
        <a href="faq.html" class="hover:text-brand-700">FAQ</a>
        <a href="index.html#book" class="hover:text-brand-700">Book a Call</a>
      </nav>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-6 py-10 md:py-14">
    <a href="index.html" class="inline-flex items-center gap-2 text-sm font-semibold text-brand-700 hover:text-brand-900 mb-8">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      All programs
    </a>

    <div id="loading" class="py-20 text-center text-slate-400">Loading guide...</div>

    <article id="article" class="hidden">
      <div class="flex items-center gap-3 mb-4">
        <span id="category-badge" class="hidden text-xs font-bold uppercase tracking-wider px-2.5 py-1 rounded-full"></span>
        <time id="updated" class="text-xs text-slate-500"></time>
      </div>
      <h1 id="title" class="text-4xl md:text-5xl font-extrabold tracking-tight text-slate-900 leading-tight mb-4"></h1>
      <p id="summary" class="text-xl text-slate-600 leading-relaxed mb-10 pb-10 border-b border-slate-200"></p>
      <div id="content" class="prose prose-slate prose-lg max-w-none"></div>

      <aside class="mt-16 p-8 bg-gradient-to-br from-brand-700 to-brand-800 text-white rounded-2xl">
        <h3 class="text-2xl font-bold mb-2">Need help with this application?</h3>
        <p class="text-brand-50/90 mb-5">Book a free 20-minute call and we'll walk through it together.</p>
        <a id="cta-calendly" href="#" class="inline-block bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold px-6 py-3 rounded-xl transition-colors">Schedule on Calendly</a>
      </aside>
    </article>

    <div id="notfound" class="hidden py-16 text-center bg-white border-2 border-dashed border-slate-200 rounded-2xl">
      <p class="text-2xl font-bold text-slate-700 mb-2">Guide not found</p>
      <p class="text-slate-500 mb-6">The program you're looking for doesn't exist yet.</p>
      <a href="index.html" class="inline-block bg-brand-700 hover:bg-brand-800 text-white font-bold px-5 py-2.5 rounded-xl">Browse all programs</a>
    </div>
  </main>

  <footer class="bg-slate-900 text-slate-400 text-sm mt-20">
    <div class="max-w-5xl mx-auto px-6 py-10 flex flex-col md:flex-row items-center justify-between gap-4">
      <p id="footer-copyright"></p>
      <a href="index.html#book" class="hover:text-white">Book a Call</a>
    </div>
  </footer>

  <script src="assets/config.js"></script>
  <script src="assets/supabase-client.js"></script>
  <script src="assets/apply-config.js"></script>
  <script>
    const CATEGORY_COLORS = {
      Food:'bg-emerald-100 text-emerald-800',
      Health:'bg-rose-100 text-rose-800',
      Housing:'bg-blue-100 text-blue-800',
      Energy:'bg-amber-100 text-amber-800',
      Family:'bg-purple-100 text-purple-800',
      Income:'bg-teal-100 text-teal-800',
    };

    function applyConfig() {
      const C = window.SITE_CONFIG;
      document.getElementById('footer-copyright').textContent = C.footer.copyright;
      document.getElementById('cta-calendly').href = C.calendlyUrl;
    }

    function showNotFound() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('notfound').classList.remove('hidden');
    }

    async function loadPost() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('title');
      if (!slug) return showNotFound();

      let post;
      try { post = await window.ProgramsDB.getBySlug(slug); }
      catch (e) { console.error(e); return showNotFound(); }
      if (!post) return showNotFound();

      const C = window.SITE_CONFIG;
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('article').classList.remove('hidden');
      document.title = `${post.title} · ${C.name}`;
      document.getElementById('title').textContent   = post.title;
      document.getElementById('summary').textContent = post.summary || '';

      const cat = document.getElementById('category-badge');
      if (post.category) {
        cat.textContent = post.category;
        cat.classList.add(...(CATEGORY_COLORS[post.category] || 'bg-slate-100 text-slate-700').split(' '));
        cat.classList.remove('hidden');
      }

      const updated = post.updated_at || post.created_at;
      if (updated) {
        document.getElementById('updated').textContent =
          'Last updated ' + new Date(updated).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
      }

      document.getElementById('content').innerHTML =
        DOMPurify.sanitize(marked.parse(post.content_md || ''));
    }

    /* Reading progress bar */
    window.addEventListener('scroll', () => {
      const h = document.documentElement;
      document.getElementById('progress').style.width =
        ((h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100) + '%';
    });

    /* Init */
    applyConfig();
    window.applyDynamicConfig().then(applyConfig);
    loadPost();
  </script>
</body>
</html>
