<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <title>Book a Call · Baltimore Community Resource Network</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Book a free 20-minute call to get help applying for a government program.">

  <link rel="canonical" href="https://baltcrn.org/book.html">

  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="Baltimore Community Resource Network">
  <meta property="og:title"       content="Book a Call · Baltimore Community Resource Network">
  <meta property="og:description" content="Book a free 20-minute call to get help applying for a government assistance program.">
  <meta property="og:url"         content="https://baltcrn.org/book.html">
  <meta property="og:image"       content="https://baltcrn.org/assets/logo.png">

  <meta name="twitter:card"        content="summary">
  <meta name="twitter:title"       content="Book a Call · Baltimore Community Resource Network">
  <meta name="twitter:description" content="Book a free 20-minute call to get help applying for a government assistance program.">
  <meta name="twitter:image"       content="https://baltcrn.org/assets/logo.png">

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { sans: ['Inter', 'sans-serif'] },
      colors: { brand: { 50:'#eff3f8',100:'#dbeafe',500:'#2e5a8f',600:'#25496f',700:'#1e3a5f',800:'#162d4a',900:'#0f2540' } }
    }}}
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    /* Calendly's inline widget renders at ~700–720px on desktop. The
     * container is sized to match so there's no empty space beneath it.
     * On mobile the flow is taller, so allow more height. */
    .calendly-fill { height: 720px; min-width: 320px; }
    @media (max-width: 640px) { .calendly-fill { height: 1150px; } }
  </style>
</head>
<body class="bg-stone-50 text-slate-900 antialiased">

  <header class="bg-white border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6">
      <!-- Mobile: logo centered, two CTA buttons below -->
      <div class="md:hidden flex flex-col items-center py-3 gap-3">
        <a href="index.html" class="flex items-center">
          <img src="assets/logo.png" alt="BCRN — Baltimore Community Resource Network" class="h-12 w-auto">
        </a>
        <div class="flex items-center gap-2">
          <a href="contact.html" class="text-xs font-bold bg-white border border-brand-700 text-brand-700 hover:bg-brand-50 px-3 py-1.5 rounded-lg transition-colors">Message Us</a>
          <a href="book.html" class="text-xs font-bold bg-brand-700 text-white px-3 py-1.5 rounded-lg transition-colors">Book a Call</a>
        </div>
      </div>
      <!-- Desktop: single row -->
      <div class="hidden md:flex h-16 items-center justify-between">
        <a href="index.html" class="flex items-center gap-2">
          <img src="assets/logo.png" alt="BCRN — Baltimore Community Resource Network" class="h-12 w-auto">
        </a>
        <nav class="flex items-center gap-7 text-sm font-semibold text-slate-600">
          <a href="index.html#programs" class="hover:text-brand-700">Programs</a>
          <a id="nav-faq" href="faq.html" class="hidden hover:text-brand-700">FAQ</a>
          <a href="contact.html" class="hover:text-brand-700">Contact</a>
          <a href="book.html"    class="text-brand-700">Book a Call</a>
        </nav>
      </div>
    </div>
    <div class="max-w-7xl mx-auto px-6 pb-3 text-center">
      <h1 id="page-heading" class="text-lg font-bold tracking-tight text-slate-900">Book a free call</h1>
      <p id="page-subhead" class="text-slate-500 text-sm mt-0.5">Pick a time below — most calls are 20 minutes.</p>
    </div>
  </header>

  <main>
    <div id="calendly-inline" class="calendly-fill w-full"></div>
  </main>

  <footer id="site-footer"></footer>

  <script src="assets/config.js"></script>
  <script src="assets/supabase-client.js"></script>
  <script src="assets/apply-config.js"></script>
  <script src="assets/footer.js"></script>
  <script>
    function applyConfig() {
      const C = window.SITE_CONFIG;
      document.title = `Book a Call · ${C.name}`;
      document.getElementById('page-heading').textContent  = C.book.heading || 'Book a free call';
      document.getElementById('page-subhead').textContent  = C.book.subhead  || 'Pick a time below.';
      const faqLink = document.getElementById('nav-faq');
      if (faqLink) faqLink.classList.toggle('hidden', C.faqEnabled === false);
      mountCalendly(C.calendlyUrl);
      window.mountFooter();
    }

    function mountCalendly(url) {
      const target = document.getElementById('calendly-inline');
      if (target.dataset.initializedFor === url) return;
      target.dataset.initializedFor = url;
      target.innerHTML = `<div class="calendly-inline-widget" data-url="${url}" style="min-width:320px;width:100%;height:100%;"></div>`;
      if (!document.getElementById('calendly-widget-script')) {
        const s = document.createElement('script');
        s.id = 'calendly-widget-script';
        s.src = 'https://assets.calendly.com/assets/external/widget.js';
        s.async = true;
        document.body.appendChild(s);
      } else if (window.Calendly) {
        window.Calendly.initInlineWidget({ url, parentElement: target.querySelector('.calendly-inline-widget') });
      }
    }

    applyConfig();
    window.applyDynamicConfig().then(applyConfig);
  </script>
</body>
</html>
