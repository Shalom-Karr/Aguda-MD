<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <title>Book a Call · Agudath Israel of Maryland</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Book a free 20-minute call to get help applying for a government program.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { sans: ['Inter', 'sans-serif'] },
      colors: { brand: { 50:'#f0fdfa',100:'#ccfbf1',500:'#14b8a6',600:'#0d9488',700:'#0f766e',800:'#115e59',900:'#134e4a' } }
    }}}
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    /* Tall enough that Calendly's calendar view fits without an internal
     * scrollbar; the page document scrolls naturally if it overflows. */
    .calendly-fill { height: 1100px; }
    @media (max-width: 640px) {
      .calendly-fill { height: 1300px; }
    }
  </style>
</head>
<body class="bg-stone-50 text-slate-900 antialiased">

  <!-- Combined header: nav row + page heading row, both white -->
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <img src="assets/logo.png" alt="Agudath Israel of Maryland" class="h-11 w-auto">
      </a>
      <nav class="hidden md:flex items-center gap-7 text-sm font-semibold text-slate-600">
        <a href="index.html" class="hover:text-brand-700">Programs</a>
        <a href="faq.html"   class="hover:text-brand-700">FAQ</a>
        <a href="book.html"  class="text-brand-700">Book a Call</a>
      </nav>
    </div>
    <div class="max-w-7xl mx-auto px-6 pb-5 text-center">
      <h1 id="page-heading" class="text-2xl md:text-3xl font-extrabold tracking-tight text-slate-900">Book a free call</h1>
      <p id="page-subhead" class="text-slate-500 mt-1">Pick a time below — most calls are 20 minutes.</p>
    </div>
  </header>

  <main>
    <!-- Full-width Calendly embed — tall enough that the widget renders
         without its own scrollbar; page scrolls naturally if needed. -->
    <div id="calendly-inline" class="calendly-fill w-full"></div>
  </main>

  <footer class="bg-slate-900 text-slate-400 text-sm">
    <div class="max-w-7xl mx-auto px-6 py-8 flex flex-col md:flex-row items-center justify-between gap-4">
      <p id="footer-copyright"></p>
      <div class="flex gap-5">
        <a href="index.html" class="hover:text-white">Programs</a>
        <a href="faq.html"   class="hover:text-white">FAQ</a>
      </div>
    </div>
  </footer>

  <script src="assets/config.js"></script>
  <script src="assets/supabase-client.js"></script>
  <script src="assets/apply-config.js"></script>
  <script>
    function applyConfig() {
      const C = window.SITE_CONFIG;
      document.title = `Book a Call · ${C.name}`;
      document.getElementById('page-heading').textContent  = C.book.heading || 'Book a free call';
      document.getElementById('page-subhead').textContent  = C.book.subhead  || 'Pick a time below.';
      document.getElementById('footer-copyright').textContent = C.footer.copyright;
      mountCalendly(C.calendlyUrl);
    }

    function mountCalendly(url) {
      const target = document.getElementById('calendly-inline');
      if (target.dataset.initializedFor === url) return;
      target.dataset.initializedFor = url;
      target.innerHTML = `<div class="calendly-inline-widget" data-url="${url}" style="min-width:320px;width:100%;height:100%;"></div>`;
      if (!document.getElementById('calendly-widget-script')) {
        const s = document.createElement('script');
        s.id = 'calendly-widget-script';
        s.src = 'https://assets.calendly.com/assets/external/widget.js';
        s.async = true;
        document.body.appendChild(s);
      } else if (window.Calendly) {
        window.Calendly.initInlineWidget({ url, parentElement: target.querySelector('.calendly-inline-widget') });
      }
    }

    applyConfig();
    window.applyDynamicConfig().then(applyConfig);
  </script>
</body>
</html>
